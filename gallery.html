<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Mare — Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #050509;
      color: #fdf9ff;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #f7c6d9, #ffe58a, #d7c6ff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }

    .grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 0.75rem;
      border: 1px solid rgba(247, 198, 217, 0.4);
    }

    a {
      color: #ffe58a;
      text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <a href="index.html">← Back to Home</a>

  <h1>Happy Mare Gallery</h1>

  <div class="grid">
    <!-- This script automatically loads ALL your images -->
    <script>
      const images = [
        "IMG_2100.HEIC",
        "IMG_2101.HEIC",
        "IMG_2102.HEIC",
        "IMG_2103.HEIC",
        "IMG_2104.HEIC",
        "IMG_2105.HEIC",
        "IMG_2106.HEIC",
        "IMG_2107.HEIC",
        "IMG_2108.HEIC",
        "IMG_2109.HEIC",
        "IMG_2110.HEIC",
        "IMG_2111.HEIC",
        "IMG_2112.HEIC"
      ];

      images.forEach(name => {
        document.write(`<img src="${name}" alt="Happy Mare Art">`);
      });
    </script>
  </div>

</body>
</html>
